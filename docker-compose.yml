#    ports:
#      - "8083:8083"
#    environment:
#      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/queuedb
#      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
#    networks:
#      - lpg-network
#    depends_on:
#      mongodb:
#        condition: service_healthy
#      eureka-server:
#        condition: service_healthy
#      inventory-service:
#        condition: service_started

  # ── API GATEWAY ────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - lpg-network
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

# ── VOLUMES ──────────────────────────────────
volumes:
  postgres-user-data:
  postgres-inventory-data:
#  mongodb-data:

# ── NETWORK ──────────────────────────────────
networks:
  lpg-network:
    driver: bridge